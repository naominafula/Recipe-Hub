{% extends 'base.html' %}
{% block title %}{{ title }} - RecipeHub{% endblock %}
{% block content %}

<div class="card">
    <h1>{{ title }}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Recipe</button>
    </form>
</div>

{% endblock %}
