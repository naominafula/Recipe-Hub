<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}RecipeHub{% endblock %}</title>
    <style>
        :root {
            --primary: #8fb9a8;
            --primary-dark: #6f9c8a;
            --accent: #f0c3d3;
            --accent-dark: #e0a3ba;
            --bg: #fdf6f8;
            --card-bg: #ffffff;
            --text: #3d3d3d;
        }
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        header a { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 1.4em; }
        nav a { margin-left: 12px; text-decoration: none; color: var(--primary-dark); font-weight: 600; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(143, 185, 168, 0.2); border: 1px solid #e6d3da; border-top: 4px solid var(--accent); }
        .card h2 a { color: var(--primary-dark); text-decoration: none; }
        .messages { list-style: none; padding: 0; }
        .messages li { background: #f9e4ec; color: #7a4a5c; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid var(--accent-dark); }
        img.recipe-img { max-width: 100%; border-radius: 8px; }
        input, select, textarea { width: 100%; padding: 8px; margin: 6px 0 12px; box-sizing: border-box; border: 1px solid #d9c3cc; border-radius: 6px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
        button, .btn { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; transition: background 0.15s; }
        button:hover, .btn:hover { background: var(--primary-dark); }
        .btn-secondary { background: var(--accent); color: var(--text); }
        .btn-secondary:hover { background: var(--accent-dark); }
    </style>
</head>
<body>
    <header>
        <a href="{% url 'recipe_list' %}">🍳 RecipeHub</a>
        <nav>
            {% if user.is_authenticated %}
                <span>Hi, {{ user.username }}</span>
                <a href="{% url 'recipe_create' %}">+ New Recipe</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline; margin:0; padding:0;">
                    {% csrf_token %}
                    <button type="submit" style="background:none; border:none; color:#333; text-decoration:underline; cursor:pointer; padding:0; margin-left:12px; font:inherit;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
