{% extends 'base.html' %}
{% block title %}Delete {{ recipe.title }} - RecipeHub{% endblock %}
{% block content %}

<div class="card">
    <h1>Delete "{{ recipe.title }}"?</h1>
    <p>This action cannot be undone. Are you sure you want to permanently delete this recipe?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn">Yes, delete it</button>
        <a class="btn btn-secondary" href="{% url 'recipe_detail' recipe.pk %}">Cancel</a>
    </form>
</div>

{% endblock %}
